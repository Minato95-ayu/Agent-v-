<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>J.A.R.V.I.S. Energy Orb</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#050508;}
canvas{display:block;}
#status{
  position:fixed;bottom:28px;left:50%;transform:translateX(-50%);
  font-family:'Segoe UI',Arial,sans-serif;font-size:11px;font-weight:500;
  text-transform:uppercase;letter-spacing:3px;color:rgba(255,255,255,0.45);
  pointer-events:none;user-select:none;white-space:nowrap;
  text-shadow:0 0 8px rgba(255,180,60,0.3);
}
#stateIndicator{
  position:fixed;top:20px;right:24px;width:8px;height:8px;border-radius:50%;
  background:#555;box-shadow:0 0 6px 2px rgba(85,85,85,0.5);
  transition:background 0.4s ease,box-shadow 0.4s ease;
}
#clickPrompt{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  font-family:'Segoe UI',Arial,sans-serif;font-size:13px;font-weight:400;
  text-transform:uppercase;letter-spacing:4px;color:rgba(255,255,255,0.35);
  cursor:pointer;user-select:none;z-index:10;
  animation:promptPulse 2s ease-in-out infinite;
}
@keyframes promptPulse{
  0%,100%{opacity:0.35;}50%{opacity:0.7;}
}
::-webkit-scrollbar{display:none;}
</style>
<script type="importmap">
{
  "imports":{
    "three":"https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.min.js",
    "three/addons/":"https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>
</head>
<body>
<div id="clickPrompt">Click to activate</div>
<div id="status">INITIALIZING</div>
<div id="stateIndicator"></div>

<script type="module">
import * as THREE from 'three';
import {EffectComposer} from 'three/addons/postprocessing/EffectComposer.js';
import {RenderPass} from 'three/addons/postprocessing/RenderPass.js';
import {UnrealBloomPass} from 'three/addons/postprocessing/UnrealBloomPass.js';

// ─── State definitions ───────────────────────────────────────────
const STATES = {
  idle: {
    core: new THREE.Color('#FF9A1A'),
    edge: new THREE.Color('#FFE680'),
    deep: new THREE.Color('#CC1A00'),
    rotationSpeed: 0.001,
    noiseScale: 2.0,
    bloomBase: 1.5
  },
  listening: {
    core: new THREE.Color('#FFD700'),
    edge: new THREE.Color('#FFFACD'),
    deep: new THREE.Color('#FF8C00'),
    rotationSpeed: 0.002,
    noiseScale: 2.2,
    bloomBase: 1.8
  },
  thinking: {
    core: new THREE.Color('#9B59B6'),
    edge: new THREE.Color('#D7BDE2'),
    deep: new THREE.Color('#6C3483'),
    rotationSpeed: 0.005,
    noiseScale: 3.0,
    bloomBase: 1.6
  },
  speaking: {
    core: new THREE.Color('#FF4500'),
    edge: new THREE.Color('#FF6347'),
    deep: new THREE.Color('#CC0000'),
    rotationSpeed: 0.003,
    noiseScale: 2.5,
    bloomBase: 2.0
  },
  executing: {
    core: new THREE.Color('#00CED1'),
    edge: new THREE.Color('#7FFFD4'),
    deep: new THREE.Color('#008B8B'),
    rotationSpeed: 0.004,
    noiseScale: 2.8,
    bloomBase: 1.7
  }
};

const indicatorColors = {
  idle:      '#FF9A1A',
  listening: '#FFD700',
  thinking:  '#9B59B6',
  speaking:  '#FF4500',
  executing: '#00CED1'
};

// ─── Globals ─────────────────────────────────────────────────────
let currentState = 'idle';
let targetState = STATES.idle;
let smoothedAmplitude = 0;
let rotationSpeed = 0.001;
let targetRotationSpeed = 0.001;
let currentNoiseScale = 2.0;
let targetNoiseScale = 2.0;
let currentBloomBase = 1.5;
let targetBloomBase = 1.5;

const currentCore = new THREE.Color('#FF9A1A');
const currentEdge = new THREE.Color('#FFE680');
const currentDeep = new THREE.Color('#CC1A00');

// ─── DOM refs ────────────────────────────────────────────────────
const statusEl = document.getElementById('status');
const indicatorEl = document.getElementById('stateIndicator');
const promptEl = document.getElementById('clickPrompt');

// ─── Three.js setup ─────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({antialias: false});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 0, 6);
camera.lookAt(0, 0, 0);

// ─── Post-processing ────────────────────────────────────────────
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloomPass = new UnrealBloomPass(
  new THREE.Vector2(window.innerWidth, window.innerHeight),
  1.5, 0.4, 0.1
);
composer.addPass(bloomPass);

// ─── Shader code ─────────────────────────────────────────────────
const noiseGLSL = `
vec4 mod289(vec4 x){return x-floor(x*(1.0/289.0))*289.0;}
float mod289(float x){return x-floor(x*(1.0/289.0))*289.0;}
vec4 permute(vec4 x){return mod289(((x*34.0)+1.0)*x);}
float permute(float x){return mod289(((x*34.0)+1.0)*x);}
vec4 taylorInvSqrt(vec4 r){return 1.79284291400159-0.85373472095314*r;}
float taylorInvSqrt(float r){return 1.79284291400159-0.85373472095314*r;}
vec4 grad4(float j,vec4 ip){
  const vec4 ones=vec4(1.0,1.0,1.0,-1.0);
  vec4 p,s;
  p.xyz=floor(fract(vec3(j)*ip.xyz)*7.0)*ip.z-1.0;
  p.w=1.5-dot(abs(p.xyz),ones.xyz);
  s=vec4(lessThan(p,vec4(0.0)));
  p.xyz=p.xyz+(s.xyz*2.0-1.0)*s.www;
  return p;
}
#define F4 0.309016994374947451
float snoise(vec4 v){
  const vec4 C=vec4(0.138196601125011,0.276393202250021,0.414589803375032,-0.447213595499958);
  vec4 i=floor(v+dot(v,vec4(F4)));vec4 x0=v-i+dot(i,C.xxxx);
  vec4 i0;vec3 isX=step(x0.yzw,x0.xxx);vec3 isYZ=step(x0.zww,x0.yyz);
  i0.x=isX.x+isX.y+isX.z;i0.yzw=1.0-isX;
  i0.y+=isYZ.x+isYZ.y;i0.zw+=1.0-isYZ.xy;
  i0.z+=isYZ.z;i0.w+=1.0-isYZ.z;
  vec4 i3=clamp(i0,0.0,1.0);vec4 i2=clamp(i0-1.0,0.0,1.0);vec4 i1=clamp(i0-2.0,0.0,1.0);
  vec4 x1=x0-i1+C.xxxx;vec4 x2=x0-i2+C.yyyy;vec4 x3=x0-i3+C.zzzz;vec4 x4=x0+C.wwww;
  i=mod289(i);
  float j0=permute(permute(permute(permute(i.w)+i.z)+i.y)+i.x);
  vec4 j1=permute(permute(permute(permute(i.w+vec4(i1.w,i2.w,i3.w,1.0))+i.z+vec4(i1.z,i2.z,i3.z,1.0))+i.y+vec4(i1.y,i2.y,i3.y,1.0))+i.x+vec4(i1.x,i2.x,i3.x,1.0));
  vec4 ip=vec4(1.0/294.0,1.0/49.0,1.0/7.0,0.0);
  vec4 p0=grad4(j0,ip);vec4 p1=grad4(j1.x,ip);vec4 p2=grad4(j1.y,ip);vec4 p3=grad4(j1.z,ip);vec4 p4=grad4(j1.w,ip);
  vec4 norm=taylorInvSqrt(vec4(dot(p0,p0),dot(p1,p1),dot(p2,p2),dot(p3,p3)));
  p0*=norm.x;p1*=norm.y;p2*=norm.z;p3*=norm.w;
  float norm2=taylorInvSqrt(dot(p4,p4));p4*=norm2;
  vec3 m0=max(0.6-vec3(dot(x0,x0),dot(x1,x1),dot(x2,x2)),0.0);
  vec2 m1=max(0.6-vec2(dot(x3,x3),dot(x4,x4)),0.0);
  m0=m0*m0;m1=m1*m1;
  return 49.0*(dot(m0*m0,vec3(dot(p0,x0),dot(p1,x1),dot(p2,x2)))+dot(m1*m1,vec2(dot(p3,x3),dot(p4,x4))));
}
`;

const orbVertexShader = `
uniform float uTime;
uniform float uAmplitude;
uniform float uNoiseScale;

varying vec3 vNormal;
varying vec3 vWorldPosition;
varying float vNoise;

${noiseGLSL}

void main(){
  vec3 pos = position;

  float noise1 = snoise(vec4(pos * uNoiseScale, uTime * 0.3)) * 0.5;
  float noise2 = snoise(vec4(pos * 2.0 * uNoiseScale, uTime * 0.6)) * 0.25;
  float totalNoise = noise1 + noise2;

  float displacement = totalNoise * (0.15 + uAmplitude * 0.4);
  pos += normal * displacement;

  vNoise = totalNoise;
  vNormal = normalize(normalMatrix * normal);
  vWorldPosition = (modelMatrix * vec4(pos, 1.0)).xyz;

  gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
}
`;

const orbFragmentShader = `
uniform vec3 uColorCore;
uniform vec3 uColorEdge;
uniform vec3 uColorDeep;
uniform float uAmplitude;

varying vec3 vNormal;
varying vec3 vWorldPosition;
varying float vNoise;

void main(){
  vec3 viewDir = normalize(cameraPosition - vWorldPosition);
  float fresnel = pow(1.0 - max(dot(viewDir, vNormal), 0.0), 3.0);

  vec3 baseColor = mix(uColorDeep, uColorCore, vNoise * 0.5 + 0.5);
  vec3 finalColor = mix(baseColor, uColorEdge, fresnel);

  float intensity = 1.5 + uAmplitude * 2.0 + fresnel * 1.5;
  finalColor *= intensity;

  gl_FragColor = vec4(finalColor, 1.0);
}
`;

// ─── Orb mesh ────────────────────────────────────────────────────
const orbGeometry = new THREE.SphereGeometry(1.5, 128, 128);
const orbMaterial = new THREE.ShaderMaterial({
  uniforms: {
    uTime:       {value: 0},
    uAmplitude:  {value: 0},
    uNoiseScale: {value: 2.0},
    uColorCore:  {value: new THREE.Color('#FF9A1A')},
    uColorEdge:  {value: new THREE.Color('#FFE680')},
    uColorDeep:  {value: new THREE.Color('#CC1A00')}
  },
  vertexShader: orbVertexShader,
  fragmentShader: orbFragmentShader,
  toneMapped: false
});
const orb = new THREE.Mesh(orbGeometry, orbMaterial);
scene.add(orb);

// ─── Particle system ────────────────────────────────────────────
const PARTICLE_COUNT = 2000;
const particlePositions = new Float32Array(PARTICLE_COUNT * 3);
const particleSpeeds = new Float32Array(PARTICLE_COUNT);
const particlePhases = new Float32Array(PARTICLE_COUNT);
const particleRadii = new Float32Array(PARTICLE_COUNT);

for (let i = 0; i < PARTICLE_COUNT; i++) {
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.acos(2 * Math.random() - 1);
  const r = 2.0 + Math.random() * 1.5;

  particlePositions[i * 3]     = r * Math.sin(phi) * Math.cos(theta);
  particlePositions[i * 3 + 1] = r * Math.cos(phi);
  particlePositions[i * 3 + 2] = r * Math.sin(phi) * Math.sin(theta);

  particleSpeeds[i] = 0.2 + Math.random() * 0.8;
  particlePhases[i] = Math.random() * Math.PI * 2;
  particleRadii[i]  = r;
}

const particleGeometry = new THREE.BufferGeometry();
particleGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
particleGeometry.setAttribute('aSpeed', new THREE.BufferAttribute(particleSpeeds, 1));
particleGeometry.setAttribute('aPhase', new THREE.BufferAttribute(particlePhases, 1));
particleGeometry.setAttribute('aRadius', new THREE.BufferAttribute(particleRadii, 1));

const particleVertexShader = `
uniform float uTime;
uniform float uAmplitude;

attribute float aSpeed;
attribute float aPhase;
attribute float aRadius;

varying float vAlpha;

void main(){
  float angle = aPhase + uTime * aSpeed * 0.3;
  float r = aRadius + uAmplitude * 0.5;

  vec3 pos = position;
  float cosA = cos(angle);
  float sinA = sin(angle);
  vec3 rotated = vec3(
    pos.x * cosA - pos.z * sinA,
    pos.y,
    pos.x * sinA + pos.z * cosA
  );

  // Normalize to unit sphere then scale to desired radius
  vec3 dir = normalize(rotated);
  vec3 finalPos = dir * r;

  vec4 mvPos = modelViewMatrix * vec4(finalPos, 1.0);
  gl_Position = projectionMatrix * mvPos;

  float size = (2.5 + uAmplitude * 4.0) * (300.0 / -mvPos.z);
  gl_PointSize = max(size, 1.0);

  float dist = length(finalPos);
  vAlpha = smoothstep(3.5, 2.0, dist) * (0.4 + uAmplitude * 0.6);
}
`;

const particleFragmentShader = `
varying float vAlpha;

void main(){
  vec2 uv = gl_PointCoord - 0.5;
  float d = length(uv);
  if(d > 0.5) discard;
  float alpha = smoothstep(0.5, 0.15, d) * vAlpha;
  vec3 color = vec3(1.0, 0.7, 0.2);
  gl_FragColor = vec4(color * 2.0, alpha);
}
`;

const particleMaterial = new THREE.ShaderMaterial({
  uniforms: {
    uTime:      {value: 0},
    uAmplitude: {value: 0}
  },
  vertexShader: particleVertexShader,
  fragmentShader: particleFragmentShader,
  transparent: true,
  depthWrite: false,
  blending: THREE.AdditiveBlending,
  toneMapped: false
});

const particles = new THREE.Points(particleGeometry, particleMaterial);
scene.add(particles);

// ─── Web Audio API ───────────────────────────────────────────────
let audioCtx, analyser, dataArray, audioInitialized = false;

async function initAudio() {
  if (audioInitialized) return;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    analyser.smoothingTimeConstant = 0.8;
    dataArray = new Uint8Array(analyser.frequencyBinCount);

    const stream = await navigator.mediaDevices.getUserMedia({audio: true});
    const source = audioCtx.createMediaStreamSource(stream);
    source.connect(analyser);

    audioInitialized = true;
    promptEl.style.display = 'none';
  } catch (e) {
    console.warn('Microphone access denied:', e);
    promptEl.textContent = 'MIC DENIED';
    setTimeout(() => { promptEl.style.display = 'none'; }, 2000);
  }
}

function getAudioLevel() {
  if (!audioInitialized || !analyser) return 0;
  analyser.getByteFrequencyData(dataArray);
  let sum = 0;
  for (let i = 0; i < dataArray.length; i++) sum += dataArray[i];
  return (sum / dataArray.length) / 255;
}

document.addEventListener('click', initAudio, {once: false});

// ─── WebSocket ───────────────────────────────────────────────────
let ws = null;
let wsConnected = false;

function setStateFromWS(stateName, text) {
  const s = stateName.toLowerCase();
  if (STATES[s]) {
    currentState = s;
    targetState = STATES[s];
    targetRotationSpeed = targetState.rotationSpeed;
    targetNoiseScale = targetState.noiseScale;
    targetBloomBase = targetState.bloomBase;

    indicatorEl.style.background = indicatorColors[s] || '#555';
    indicatorEl.style.boxShadow = `0 0 8px 3px ${indicatorColors[s] || '#555'}`;
  }
  if (text) {
    statusEl.textContent = text;
  } else {
    statusEl.textContent = s.toUpperCase();
  }
}

function connectWS() {
  try {
    ws = new WebSocket('ws://127.0.0.1:8888/ws');

    ws.onopen = () => {
      wsConnected = true;
      indicatorEl.style.background = indicatorColors[currentState];
      indicatorEl.style.boxShadow = `0 0 8px 3px ${indicatorColors[currentState]}`;
    };

    ws.onmessage = (event) => {
      try {
        const msg = JSON.parse(event.data);
        if (msg.type === 'state') {
          setStateFromWS(msg.state, msg.text);
        }
      } catch (e) { /* ignore parse errors */ }
    };

    ws.onclose = () => {
      wsConnected = false;
      indicatorEl.style.background = '#555';
      indicatorEl.style.boxShadow = '0 0 6px 2px rgba(85,85,85,0.5)';
      setTimeout(connectWS, 3000);
    };

    ws.onerror = () => {
      ws.close();
    };
  } catch (e) {
    setTimeout(connectWS, 3000);
  }
}

connectWS();

// ─── Resize ──────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  const w = window.innerWidth, h = window.innerHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
  composer.setSize(w, h);
});

// ─── Animation loop ──────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);

  const t = performance.now() * 0.001;

  // Audio
  const rawAmp = getAudioLevel();
  smoothedAmplitude += (rawAmp - smoothedAmplitude) * 0.1;

  // Lerp colors
  currentCore.lerp(targetState.core, 0.03);
  currentEdge.lerp(targetState.edge, 0.03);
  currentDeep.lerp(targetState.deep, 0.03);

  // Lerp parameters
  rotationSpeed += (targetRotationSpeed - rotationSpeed) * 0.03;
  currentNoiseScale += (targetNoiseScale - currentNoiseScale) * 0.03;
  currentBloomBase += (targetBloomBase - currentBloomBase) * 0.03;

  // Update orb uniforms
  orbMaterial.uniforms.uTime.value = t;
  orbMaterial.uniforms.uAmplitude.value = smoothedAmplitude;
  orbMaterial.uniforms.uNoiseScale.value = currentNoiseScale;
  orbMaterial.uniforms.uColorCore.value.copy(currentCore);
  orbMaterial.uniforms.uColorEdge.value.copy(currentEdge);
  orbMaterial.uniforms.uColorDeep.value.copy(currentDeep);

  // Rotate orb
  orb.rotation.y += rotationSpeed;
  orb.rotation.x += rotationSpeed * 0.3;

  // Scale pulse
  const scalePulse = 1.0 + smoothedAmplitude * 0.15;
  orb.scale.setScalar(scalePulse);

  // Particle uniforms
  particleMaterial.uniforms.uTime.value = t;
  particleMaterial.uniforms.uAmplitude.value = smoothedAmplitude;

  // Bloom pulse
  bloomPass.strength = currentBloomBase + smoothedAmplitude * 1.5;

  composer.render();
}

animate();
</script>
</body>
</html>
